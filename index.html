<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manthan Game Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
padding:40px 20px;
}

h1{
text-align:center;
font-size:3rem;
margin-bottom:40px;
background:linear-gradient(90deg,#00f5ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1300px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
text-align:center;
transition:0.4s;
border:1px solid rgba(255,255,255,0.2);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
background:rgba(255,255,255,0.2);
}

.card h2{
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:10px 25px;
border-radius:30px;
background:linear-gradient(90deg,#00f5ff,#00ff95);
color:black;
font-weight:600;
text-decoration:none;
}

.btn:hover{
opacity:0.8;
}
</style>
</head>
<body>

<h1>🎮 All Projects Hub</h1>

<div class="grid">

<div class="card">
<h2>2048</h2>
<a href="2048.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Advanced 2048</h2>
<a href="Advanced2048.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Beat Catcher</h2>
<a href="Beatcatcher.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Best Bird</h2>
<a href="Bestbird.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Flappy Bird</h2>
<a href="Flappybird2.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Memory Game</h2>
<a href="memory.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Sudoku</h2>
<a href="sudoku.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Tic Tac Toe</h2>
<a href="tictactoe.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Love Page</h2>
<a href="love.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Letter Page</h2>
<a href="letter.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Envelope Animation</h2>
<a href="envelop.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Quiz App</h2>
<a href="Quiz App/index.html" class="btn">Open</a>
</div>

</div>

</body>
</html>
